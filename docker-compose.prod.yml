services:
  # ── Pipeline de Dados ──────────────────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    container_name: healthcare-pipeline
    environment:
      SPARK_MASTER: "local[*]"
      SPARK_EXECUTOR_MEMORY: "2g"
      DATA_LAKE_PATH: "/opt/pipeline/output/data_lake"
      KAFKA_BROKERS: "kafka:9092"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: healthcare
      DB_USER: pipeline
      DB_PASSWORD: pipeline123
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-chave-segura-producao}"
      # RDS AWS — defina RDS_PASSWORD no ambiente para replicar dados para a nuvem
      RDS_HOST: ${RDS_HOST:-healthcare-lean-dev.c8xg4i8k0ii9.us-east-1.rds.amazonaws.com}
      RDS_DB: ${RDS_DB:-healthcare}
      RDS_USER: ${RDS_USER:-pipeline}
      RDS_PASSWORD: ${RDS_PASSWORD:-}
      SIMULATED_RECORDS: "500"
      LOG_LEVEL: INFO
      # Observabilidade: expõe métricas em :8000 e mantém o container vivo
      # para o Prometheus coletar. Defina METRICS_LOOP_INTERVAL > 0 (segundos)
      # para reexecutar o pipeline periodicamente e alimentar os gráficos.
      METRICS_ENABLED: "true"
      METRICS_KEEP_ALIVE: "true"
      METRICS_LOOP_INTERVAL: "${METRICS_LOOP_INTERVAL:-120}"
    volumes:
      - pipeline-output:/opt/pipeline/output
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"  # Prometheus metrics
      - "4040:4040"  # Spark UI
    networks:
      - healthcare

  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: healthcare-db
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d healthcare"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - healthcare

  # ── Kafka (Streaming) ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: healthcare-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - healthcare

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: healthcare-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - healthcare

  # ── Prometheus ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: healthcare-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - healthcare

  # ── Grafana ────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: healthcare-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Datasource do RDS na AWS (deploy enxuto). Defina RDS_PASSWORD no
      # ambiente antes de subir; host/db/user têm defaults.
      RDS_HOST: ${RDS_HOST:-healthcare-lean-dev.c8xg4i8k0ii9.us-east-1.rds.amazonaws.com}
      RDS_DB: ${RDS_DB:-healthcare}
      RDS_USER: ${RDS_USER:-pipeline}
      RDS_PASSWORD: ${RDS_PASSWORD:-}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - healthcare

  # ── Airflow ────────────────────────────────────────────────────────
  airflow-webserver:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.airflow
    container_name: healthcare-airflow-web
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin
                 --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
               airflow webserver"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://pipeline:pipeline123@postgres:5432/healthcare
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthcare

  airflow-scheduler:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.airflow
    container_name: healthcare-airflow-scheduler
    command: >
      bash -c "airflow db migrate && airflow scheduler"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://pipeline:pipeline123@postgres:5432/healthcare
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthcare

volumes:
  pgdata:
  pipeline-output:
  prometheus-data:
  grafana-data:

networks:
  healthcare:
    driver: bridge
