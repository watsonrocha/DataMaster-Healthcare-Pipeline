apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    uid: local-postgres
    type: postgres
    url: postgres:5432
    database: healthcare
    user: pipeline
    secureJsonData:
      password: pipeline123
    jsonData:
      sslmode: disable
      postgresVersion: 1600

  # RDS PostgreSQL na AWS (deploy enxuto). Host/senha vêm de variáveis de
  # ambiente passadas ao container do Grafana (ver docker-compose.prod.yml).
  - name: PostgreSQL RDS (AWS)
    uid: rds-postgres
    type: postgres
    url: $RDS_HOST:5432
    database: $RDS_DB
    user: $RDS_USER
    secureJsonData:
      password: $RDS_PASSWORD
    jsonData:
      sslmode: require
      postgresVersion: 1600
