version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: healthcare_db
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d healthcare"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
